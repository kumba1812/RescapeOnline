<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact — RESCAPE</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <div class="nav-left"><a href="index.html">Home</a></div>
      <div class="nav-center"><img src="assets/images/rescape-logo.jpg" alt="Rescape logo" class="nav-logo"></div>
      <div class="nav-right"><a href="accommodation.html">Accommodation</a> <a href="universities.html">Universities</a></div>
    </nav>
  </header>

  <main>
    <section class="hero" style="background:var(--white);">
      <div class="hero-overlay">
        <h1>Contact</h1>
        <p class="slogan">Get in touch with RESCAPE</p>
      </div>
    </section>

    <section class="listing-intro">
      <h2>Contact Us</h2>
      <p>For enquiries about listing properties, partnerships, or support, please use the form below or email hello@rescape.example</p>
    </section>

    <section style="max-width:640px;margin:18px auto;padding:0 16px;">
      <form>
        <label>Name<br><input style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(0,0,0,0.08)"/></label>
        <label style="display:block;margin-top:10px">Email<br><input style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(0,0,0,0.08)"/></label>
        <label style="display:block;margin-top:10px">Message<br><textarea style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(0,0,0,0.08);min-height:120px"></textarea></label>
        <div style="text-align:right;margin-top:10px"><button class="btn primary" type="submit">Send</button></div>
      </form>
    </section>

    <footer class="site-footer">
      <p>&copy; RESCAPE</p>
    </footer>
  </main>
</body>
</html>
