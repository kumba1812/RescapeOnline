<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Universities — RESCAPE</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <button class="menu-toggle" aria-expanded="false" aria-controls="mobile-menu" aria-label="Open menu">☰</button>
      <div class="nav-left"><a href="index.html" class="brand-link"><img src="assets/images/rescape-logo.jpg" alt="Rescape logo" class="nav-logo"><span class="brand-name">Rescape</span></a></div>
      <div class="nav-center mobile-logo"><a href="index.html" class="brand-link"><img src="assets/images/rescape-logo.jpg" alt="Rescape logo" class="nav-logo"><span class="brand-name">Rescape</span></a></div>
      <div class="nav-right"><a class="btn primary" href="index.html">Home</a> <a class="btn primary" href="accommodation.html">Accommodation</a> <a class="btn primary" href="universities.html">Universities</a> <a class="btn primary" href="about.html">About Us</a> <a class="btn primary" href="contact.html">Contact</a></div>
    </nav>
    <div id="mobile-menu" class="mobile-nav" aria-hidden="true">
      <div class="nav-group">
        <a href="index.html">Home</a>
        <a href="accommodation.html">Accommodation</a>
        <a href="universities.html">Universities</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </header>

  <main>
    <section class="hero" style="background:var(--white);">
      <div class="hero-overlay">
        <h1>Universities</h1>
        <p class="slogan">Trusted by Students &amp; Universities</p>
      </div>
    </section>

    <section class="listing-intro">
      <h2>University Partners</h2>
      <p>Logos of partnered tertiary institutions across South Africa to build trust and credibility.</p>
    </section>

    <section class="partners">
      <div class="logos">
        <img src="assets/images/doc/image1.jpeg" alt="Partner logo">
        <img src="assets/images/doc/image2.png" alt="Partner logo">
        <img src="assets/images/doc/image3.png" alt="Partner logo">
      </div>
    </section>

    <footer class="site-footer">
      <p>&copy; RESCAPE</p>
    </footer>
  </main>
  <script>
    (function(){
      var btn = document.querySelector('.menu-toggle');
      var mobile = document.getElementById('mobile-menu');
      var header = document.querySelector('.site-header');
      if (btn && mobile) {
        btn.addEventListener('click', function(){
          var open = btn.getAttribute('aria-expanded') === 'true';
          btn.setAttribute('aria-expanded', String(!open));
          mobile.setAttribute('aria-hidden', String(open));
          document.body.classList.toggle('nav-open');
        });
        mobile.querySelectorAll('a').forEach(function(a){
          a.addEventListener('click', function(){
            btn.setAttribute('aria-expanded','false');
            mobile.setAttribute('aria-hidden','true');
            document.body.classList.remove('nav-open');
          });
        });
      }

      function onScroll(){
        if (!header) return;
        if (window.scrollY > 16) header.classList.add('scrolled'); else header.classList.remove('scrolled');
      }
      window.addEventListener('scroll', onScroll);
      onScroll();
    })();
  </script>
</body>
</html>
